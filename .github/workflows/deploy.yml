name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

env:
  # S3 se despliega en mx-central-1 (México)
  AWS_REGION: mx-central-1
  S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build de la aplicación React
        run: npm run build
        env:
          # URL base del backend (ej: https://api.tudominio.com)
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Assets estáticos (JS, CSS, imágenes): caché larga (1 año)
      # El hash en el nombre del archivo garantiza que siempre sean únicos
      - name: Subir assets estáticos a S3 (con caché larga)
        run: |
          aws s3 sync ./build s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      # index.html: sin caché para que siempre se sirva la versión más reciente
      - name: Subir index.html a S3 (sin caché)
        run: |
          aws s3 cp ./build/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # Invalida la caché de CloudFront para que los usuarios reciban los nuevos archivos
      - name: Invalidar caché de CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

